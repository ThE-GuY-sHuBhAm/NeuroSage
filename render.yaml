services:
  - type: web
    name: developmental-stuttering-api
    runtime: python-3.11
    buildCommand: pip install -r backend/speech-disorder/requirements.txt
    startCommand: cd backend/speech-disorder && uvicorn src.api.app:app --host 0.0.0.0 --port 10000
    envVars:
      - key: HF_TOKEN
        scope: build